schema_version: "1.0"

# ── Identity ──────────────────────────────────────────────────────────────────
id: "slice-load"
name: "Load Cell Amplifier"
status: "concept"
category: "sensing"

summary: "4-channel load cell / strain gauge amplifier slice using ADS1234."
description: null

# ── Versioning ────────────────────────────────────────────────────────────────
version:
  hardware: "0.1.0"
  firmware: null
  manifest: "0.1.0"

# ── Compatibility ─────────────────────────────────────────────────────────────
compatibility:
  slice_spec: ">=0.1.0 <0.2.0"
  crumbs_protocol: null
  anolis_provider_api: null

# ── Hardware ──────────────────────────────────────────────────────────────────
hardware:
  mcu:
    type: "dev-board-socket"
    form_factor: "nano"
    primary: "ATmega328P"
    supported:
      - "ATmega328P"
  primary_ic:
    manufacturer: "Texas Instruments"
    part_number: "ADS1234"
  hw_gen_current: 1
  hw_gen_supported: [1]
  pcb:
    layers: 2
    thickness: "1.6mm"
    copper_weight: "1oz"
    dimensions: "70mm x 100mm"
  connectors:
    - ref: "J1"
      type: "slice-bus-10pin"
      purpose: "power-and-i2c"
  mounting:
    pattern: "slice-standard-v0"
    hole_size: "M3"
    inset: "5mm"
  pcb_color_prototype: null
  pcb_color_production: null
  enclosure:
    supported: false
    path: null

# ── Electrical ────────────────────────────────────────────────────────────────
electrical:
  input_voltage: "12V"
  logic_voltage: "5V"
  max_current: null
  protection: null
  isolation: null

# ── Interfaces ────────────────────────────────────────────────────────────────
interfaces:
  host:
    type: "i2c"
    address_default: null
    address_configurable: false
  data:
    inputs:
      - name: "LC1"
        type: "load-cell-wheatstone"
      - name: "LC2"
        type: "load-cell-wheatstone"
      - name: "LC3"
        type: "load-cell-wheatstone"
      - name: "LC4"
        type: "load-cell-wheatstone"
    outputs: []

# ── Capabilities ──────────────────────────────────────────────────────────────
capabilities:
  - id: "load_cell_measurement"
    channels: 4
    control_modes: []

# ── Firmware ──────────────────────────────────────────────────────────────────
firmware: null

# ── Protocol ──────────────────────────────────────────────────────────────────
protocol: null

# ── Software ──────────────────────────────────────────────────────────────────
software: null

# ── Artifacts ─────────────────────────────────────────────────────────────────
artifacts:
  schematic: "hardware/BREAD_Slice.kicad_sch"
  pcb: "hardware/BREAD_Slice.kicad_pcb"
  firmware: null
  docs: null
  bom: "documentation/BOM_TEMP.ods"
  gerbers: null
  pick_and_place: null
  datasheets:
    - "documentation/ads1234.pdf"
    - "documentation/hx711F_EN.pdf"

# ── Manufacturing ─────────────────────────────────────────────────────────────
manufacturing: null

# ── Validation ────────────────────────────────────────────────────────────────
validation: null

# ── Safety ────────────────────────────────────────────────────────────────────
safety: null

# ── Dependencies ──────────────────────────────────────────────────────────────
dependencies: null

# ── Relations ─────────────────────────────────────────────────────────────────
related: null

# ── Maintainers ───────────────────────────────────────────────────────────────
maintainers:
  - name: "Cameron Brooks"
    role: "owner"

# ── License ───────────────────────────────────────────────────────────────────
license:
  hardware: "CERN-OHL-S-2.0"
  firmware: null
  software: null
  docs: "CC-BY-4.0"

# ── Repository ────────────────────────────────────────────────────────────────
repository:
  url: "https://github.com/feastorg/Slice_LOAD"

# ── Metadata ──────────────────────────────────────────────────────────────────
metadata:
  created: "2026-05-19"
  updated: "2026-05-19"
